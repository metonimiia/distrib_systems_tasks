name: ci

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      WEEK: "14"
      GROUP: "332"
      STUDENT_ID: "s12"
      IMAGE_NAME: "devices-s12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8
      - name: Линтер (необязательно)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Запуск тестов
        run: make test WEEK=${{ env.WEEK }}
      - name: Настройка Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Сборка Docker-образа
        run: |
          docker build --cache-from $IMAGE_NAME:latest -t $IMAGE_NAME:latest -f weeks/week-10/Dockerfile weeks/week-10
      - name: Подготовка артефактов
        run: |
          mkdir -p artifacts
          cp weeks/week-10/report.md artifacts/ || true
          cp weeks/week-14/README.md artifacts/ || true
      - name: Публикация артефактов
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: artifacts
