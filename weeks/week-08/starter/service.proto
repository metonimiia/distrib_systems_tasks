syntax = "proto3";

package notifications.v1;

service NotificationsService {
  rpc Create (Request) returns (Response);
  rpc Subscribe (SubscribeRequest) returns (stream Update);
}

message Request {
  string text = 1;
  string channel = 2;
}

message Response {
  string id = 1;
  string message = 2;
}

message SubscribeRequest {
  string channel = 1;
  int32 limit = 2;
}

message Update {
  string id = 1;
  string text = 2;
  string channel = 3;
}
