events {}

http {
    upstream likes_svc {
        server likes-svc-s12:8114;
    }

    upstream other_svc {
        server other-svc:8080;
    }

    server {
        listen 8080;

        location = /api/likes {
            proxy_pass http://likes_svc/likes;
        }

        location = /api/v1/likes {
            proxy_pass http://likes_svc/likes;
        }

        location = /api/other {
            proxy_pass http://other_svc/other;
        }

        location = /api/v1/other {
            proxy_pass http://other_svc/other;
        }
    }
}
